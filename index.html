<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>あいち でんしゃ すごろく</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--og:#ff7043;--ogd:#e64a19;--gn:#4caf50;--gnd:#2e7d32;--cr:#fff7e6;--br:#5d4037;}
html,body{height:100%;overflow:hidden;
  font-family:"M PLUS Rounded 1c","Hiragino Maru Gothic ProN",sans-serif;
  background:#cfe3ea;user-select:none;-webkit-user-select:none;}
#app{display:flex;flex-direction:column;height:100dvh;}
header{flex:0 0 auto;background:var(--og);color:#fff;padding:10px 14px;
  display:flex;align-items:center;gap:10px;box-shadow:0 3px 0 var(--ogd);z-index:500;}
header b{font-size:17px;font-weight:800;display:block;}
header span{font-size:10px;opacity:.92;}
#coins{margin-left:auto;background:#fff;color:var(--og);border-radius:999px;
  padding:5px 13px;font-weight:800;font-size:15px;box-shadow:0 2px 0 var(--ogd);white-space:nowrap;}
#map{flex:1 1 auto;background:#cfe3ea;z-index:1;}
.leaflet-container{font-family:inherit;background:#cfe3ea;}
#viewBtn{position:absolute;top:64px;right:12px;z-index:600;background:#fff;
  border:3px solid var(--og);color:var(--og);border-radius:12px;padding:8px 12px;
  font-size:13px;font-weight:800;font-family:inherit;cursor:pointer;box-shadow:0 3px 0 #0002;}
#viewBtn:active{transform:translateY(2px);box-shadow:none;}
#panel{flex:0 0 auto;background:#fff;border-top:4px solid #ffb74d;
  padding:10px 14px 14px;display:flex;flex-direction:column;gap:8px;z-index:500;}
.chips{display:flex;gap:6px;flex-wrap:wrap;}
.chip{display:inline-flex;align-items:center;gap:4px;background:#fff3e0;color:var(--br);
  border:2px solid #ffcc80;border-radius:999px;padding:4px 11px;font-size:13px;font-weight:700;}
.chip.line{border:none;color:#fff;}
.controls{display:flex;gap:10px;}
#roll{flex:1;background:var(--gn);color:#fff;border:none;border-radius:14px;font-size:19px;
  font-weight:800;padding:15px 0;cursor:pointer;box-shadow:0 4px 0 var(--gnd);font-family:inherit;}
#roll:disabled{background:#aaa;box-shadow:none;cursor:default;}
#roll:active:not(:disabled){transform:translateY(4px);box-shadow:none;}
#die{width:66px;background:#fffde7;border:3px solid #fbc02d;border-radius:16px;
  display:flex;align-items:center;justify-content:center;font-size:38px;}
#die.shake{animation:shake .5s linear;}
@keyframes shake{0%,100%{transform:rotate(0)}25%{transform:rotate(-15deg) scale(1.1)}50%{transform:rotate(12deg)}75%{transform:rotate(-8deg)}}

/* ===== ルーレット ===== */
#rouletteWindow{
  width:280px;height:70px;overflow:hidden;position:relative;
  border:3px solid #ffb74d;border-radius:14px;background:#fffde7;
  box-shadow:inset 0 0 20px rgba(255,183,77,0.2);
}
#rouletteWindow::before,#rouletteWindow::after{
  content:"";position:absolute;left:0;right:0;height:18px;z-index:2;pointer-events:none;
}
#rouletteWindow::before{top:0;background:linear-gradient(to bottom,#fffde7,transparent);}
#rouletteWindow::after{bottom:0;background:linear-gradient(to top,#fffde7,transparent);}
/* 選択ハイライト枠 */
#rouletteWindow .highlight{
  position:absolute;top:50%;left:4px;right:4px;height:38px;transform:translateY(-50%);
  border:2px solid var(--og);border-radius:8px;pointer-events:none;z-index:3;
  background:rgba(255,112,67,0.08);
}
#rouletteTrack{display:flex;flex-direction:column;transition:transform .08s linear;}
.roulette-item{
  height:38px;display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:800;color:#1a1410;flex-shrink:0;gap:6px;
  padding:0 10px;white-space:nowrap;
}
.roulette-item .ri-line{font-size:10px;padding:1px 6px;border-radius:999px;color:#fff;font-weight:700;}
#diceStage{
  position:fixed;inset:0;z-index:2000;display:none;
  align-items:center;justify-content:center;flex-direction:column;
  background:radial-gradient(circle at 50% 45%,rgba(0,0,0,0.3),rgba(0,0,0,0.55));
  pointer-events:none;
}
#diceStage.show{display:flex;}
#diceBox{
  width:120px;height:120px;
  filter:drop-shadow(0 8px 14px rgba(0,0,0,0.45));
}
#diceBox.rolling{animation:diceWobble .9s cubic-bezier(.36,.07,.3,1) forwards;}
@keyframes diceWobble{
  0%{transform:translateY(-120px) scale(.7) rotate(-18deg);opacity:0;}
  18%{transform:translateY(0) scale(1.05) rotate(10deg);opacity:1;}
  32%{transform:translateY(-32px) scale(.98) rotate(-8deg);}
  48%{transform:translateY(0) scale(1.02) rotate(6deg);}
  64%{transform:translateY(-14px) scale(1) rotate(-4deg);}
  80%{transform:translateY(0) scale(1) rotate(2deg);}
  100%{transform:translateY(0) scale(1) rotate(0);}
}
#diceBox svg{width:100%;height:100%;display:block;}
#diceResult{
  margin-top:30px;font-size:32px;font-weight:900;color:#fff;
  text-shadow:0 2px 12px rgba(0,0,0,0.6);opacity:0;
  font-family:"M PLUS Rounded 1c","Hiragino Maru Gothic ProN",sans-serif;
}
#diceResult.show{animation:resultPop .5s cubic-bezier(.2,1.5,.4,1) forwards;}
@keyframes resultPop{0%{opacity:0;transform:scale(.4)}100%{opacity:1;transform:scale(1)}}
#diceStage.landed #diceBox{animation:diceLand .35s ease-out;}
@keyframes diceLand{0%,100%{transform:translate(0,0)}25%{transform:translate(-5px,3px) scale(1.06)}50%{transform:translate(4px,-2px) scale(.97)}75%{transform:translate(-3px,1px)}}
.transfer .q{font-size:13px;font-weight:700;margin-bottom:6px;}
.transfer .opts{display:flex;flex-wrap:wrap;gap:6px;}
.move-head{font-size:14px;font-weight:700;text-align:center;padding:6px 0;}
.move-head b{color:var(--og);font-size:18px;}
/* 地図上オーバーレイ矢印 */
.nav-marker{cursor:pointer;pointer-events:auto;}
.nav-bubble{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(255,255,255,0.92);border:3px solid #ccc;border-radius:14px;
  padding:6px 8px;gap:2px;min-width:60px;
  box-shadow:0 3px 12px rgba(0,0,0,0.25);
  transition:transform .1s;font-family:"M PLUS Rounded 1c","Hiragino Maru Gothic ProN",sans-serif;
  backdrop-filter:blur(4px);
}
.nav-bubble:hover{transform:scale(1.08);}
.nav-bubble:active{transform:scale(.95);}
.nav-arrow{font-size:22px;line-height:1;}
.nav-name{font-size:10px;font-weight:800;white-space:nowrap;color:#1a1410;}
.nav-xfer{font-size:9px;font-weight:700;white-space:nowrap;}
.nav-line{font-size:9px;font-weight:700;white-space:nowrap;}
/* 現在地パルスリング */
.pulse-ring{
  width:40px;height:40px;border-radius:50%;
  border:3px solid currentColor;
  animation:pulse-anim 1.4s ease-out infinite;
  pointer-events:none;
}
@keyframes pulse-anim{
  0%{transform:scale(1);opacity:.9;}
  70%{transform:scale(2.2);opacity:0;}
  100%{transform:scale(2.2);opacity:0;}
}
.tbtn{background:#fff;border-radius:12px;padding:9px 13px;font-size:13px;font-weight:800;
  cursor:pointer;font-family:inherit;border-width:3px;border-style:solid;}
.tbtn:active{transform:scale(.97);}
#legend{flex:0 0 auto;background:var(--br);display:flex;gap:8px;padding:5px 14px;flex-wrap:wrap;z-index:500;}
#legend .item{display:flex;align-items:center;gap:4px;}
#legend .bar{width:16px;height:5px;border-radius:3px;}
#legend span{font-size:10px;color:#fff;}
.overlay{position:fixed;inset:0;z-index:1000;background:#000a;display:none;
  align-items:center;justify-content:center;padding:18px;}
.overlay.show{display:flex;animation:fade .35s;}
@keyframes fade{from{opacity:0}to{opacity:1}}
.card{background:#fff;border-radius:20px;padding:18px;max-width:360px;width:100%;
  display:flex;flex-direction:column;gap:10px;box-shadow:0 10px 40px #0006;}
.card .stn{font-size:13px;color:var(--og);font-weight:800;}
.card .fact-box{font-size:14px;line-height:1.7;background:#fff8e1;padding:12px;border-radius:12px;}
.quiz-type{align-self:center;background:#e3f2fd;color:#1565c0;border-radius:999px;
  padding:2px 12px;font-size:12px;font-weight:700;}
.quiz-q{font-size:18px;font-weight:800;text-align:center;margin:6px 0;}
.qopts{display:flex;flex-direction:column;gap:8px;}
.qopt{background:#fff;border:3px solid #ffb74d;border-radius:12px;padding:12px;
  font-size:17px;font-weight:800;cursor:pointer;font-family:inherit;transition:transform .08s;}
.qopt:active:not(:disabled){transform:scale(.97);}
.qopt:disabled{cursor:default;}
.result{text-align:center;font-size:16px;font-weight:800;margin-top:4px;}
.bigbtn{color:#fff;border:none;border-radius:14px;padding:13px;font-size:16px;
  font-weight:800;cursor:pointer;font-family:inherit;transition:transform .08s;}
.bigbtn:active{transform:translateY(3px);}
.train-wrap{position:absolute;pointer-events:none;z-index:900;}
</style>
</head>
<body>
<div id="app">
  <header>
    <span style="font-size:24px">🚃</span>
    <div><b>あいち でんしゃ すごろく</b></div>
    <div id="coins">🪙 0</div>
  </header>
  <div id="map"></div>
  <button id="viewBtn">🔍 ぜんたいを みる</button>
  <div id="panel">
    <div class="chips" id="chips"></div>
    <div id="action"></div>
  </div>
  <div id="legend"></div>
</div>
<div class="overlay" id="ovPopup"><div class="card" id="popupCard"></div></div>
<div class="overlay" id="ovWin"><div class="card" style="text-align:center;align-items:center" id="winCard"></div></div>
<!-- ルーレット -->
<div class="overlay" id="ovRoulette">

    <div id="rouletteWindow">
      <div id="rouletteTrack"></div>
    </div>
    <div id="rouletteBtn" style="display:none">
      <div id="rouletteResult" style="font-size:15px;line-height:1.7;text-align:center"></div>
      <button class="bigbtn" id="rouletteOk" style="background:var(--og);box-shadow:0 4px 0 var(--ogd);width:100%">
        ここを めざす！ 🚃
      </button>
    </div>
  </div>
</div>
<div id="diceStage">
  <div id="diceBox"></div>
  <div id="diceResult"></div>
</div>

function shade(hex,amt){
  let c=hex.replace("#","");
  if(c.length===3)c=[...c].map(x=>x+x).join("");
  return "#"+[0,2,4].map(i=>Math.max(0,Math.min(255,parseInt(c.slice(i,i+2),16)+amt))
    .toString(16).padStart(2,"0")).join("");
}
function makeTrainDataURL(color){
  const dark=shade(color,-40),light=shade(color,35);
  const pal={"0":null,"1":color,"2":"#bfe9ff","3":dark,"4":"#fff7b0","5":"#444","6":light};
  const S=4,cv=document.createElement("canvas");
  cv.width=16*S;cv.height=12*S;
  const ctx=cv.getContext("2d");
  ART.forEach((row,y)=>[...row].forEach((ch,x)=>{
    const col=pal[ch];if(!col)return;
    ctx.fillStyle=col;ctx.fillRect(x*S,y*S,S,S);
  }));
  return cv.toDataURL();
}

/* 駅間アニメーション移動 */
function animateTrain(fromLL,toLL,color,durationMs,onDone){
  const steps=30;
  const dlat=(toLL[0]-fromLL[0])/steps;
  const dlng=(toLL[1]-fromLL[1])/steps;
  let step=0;
  const iv=setInterval(()=>{
    step++;
    const lat=fromLL[0]+dlat*step;
    const lng=fromLL[1]+dlng*step;
    if(trainMarker) trainMarker.setLatLng([lat,lng]);
    if(followMode) map.panTo([lat,lng],{animate:false});
    if(step>=steps){clearInterval(iv);onDone();}
  },durationMs/steps);
}

    const lineLen=STATIONS[cur.line].length;
    if(isLoop){
      const d1=Math.abs(GOAL_IDX-cur.idx);
      remain=Math.min(d1,lineLen-d1)+"駅";
    } else {
      remain=Math.abs(GOAL_IDX-cur.idx)+"駅";
    }
  } else {
    // 異路線：乗換が必要。ゴール駅名を示す
    const gs=STATIONS[GOAL_LINE][GOAL_IDX];
    remain=`のりかえ →${gs.name}`;
  }
  $("chips").innerHTML=
    `<span class="chip line" style="background:${meta.color}">${meta.short}</span>`+
    `<span class="chip">いま：<b>${s.name}</b></span>`+
    `<span class="chip">ゴールまで <b>${remain}</b></span>`;
  $("coins").textContent="🪙 "+coins;
}
function renderRoll(disabled){
  $("action").innerHTML=
    `<div class="controls"><button id="roll" ${disabled?"disabled":""}>🎲 サイコロを ふる！</button><div id="die">🎲</div></div>`;
  $("roll").onclick=rollDice;
}

/* ======= サイコロ（SVG） ======= */
// 目のピップ配置（3x3グリッド上の座標）
const PIP_POS={
  1:[[1,1]],
  2:[[0,0],[2,2]],
  3:[[0,0],[1,1],[2,2]],
  4:[[0,0],[2,0],[0,2],[2,2]],
  5:[[0,0],[2,0],[1,1],[0,2],[2,2]],
  6:[[0,0],[2,0],[0,1],[2,1],[0,2],[2,2]],
};
function diceSVG(n){
  const S=120, pad=24, gap=(S-pad*2)/2, r=11;
  let pips="";
  (PIP_POS[n]||[]).forEach(([cx,cy])=>{
    pips+=`<circle cx="${pad+cx*gap}" cy="${pad+cy*gap}" r="${r}" fill="#c0392b"/>`;
  });
  return `<svg viewBox="0 0 ${S} ${S}" xmlns="http://www.w3.org/2000/svg">
    <defs><linearGradient id="dg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffef7"/><stop offset="1" stop-color="#ffe7a8"/>
    </linearGradient></defs>
    <rect x="3" y="3" width="${S-6}" height="${S-6}" rx="22" fill="url(#dg)" stroke="#e8a900" stroke-width="4"/>
    ${pips}
  </svg>`;
}

function rollDice(){
  if(phase!=="roll")return;
  phase="anim"; renderRoll(true);

  const f=Math.floor(Math.random()*6)+1; // 確定した出目＝移動マス数
  const stage=$("diceStage"), box=$("diceBox"), res=$("diceResult");

  // リセット
  box.classList.remove("rolling");
  stage.classList.remove("landed");
  res.classList.remove("show"); res.textContent="";

  stage.classList.add("show");
  playDiceSound();

  // 目がパラパラ変わるランダム演出
  let ticks=0;
  const totalTicks=14;
  const iv=setInterval(()=>{
    ticks++;
    // だんだん遅くなる演出のため、後半は表示更新間隔をあけたいが
    // setIntervalは固定なので、最後の数回は確定値寄りに
    const shown=(ticks>=totalTicks-1)?f:(Math.floor(Math.random()*6)+1);
    box.innerHTML=diceSVG(shown);
    if(ticks>=totalTicks){
      clearInterval(iv);
      box.innerHTML=diceSVG(f);   // 確定値を必ず表示
      stage.classList.add("landed");
      res.textContent=`🎲 ${f}！`;
      res.classList.add("show");
      playLandSound();
      // 演出終了→移動フェーズ
      setTimeout(()=>{
        stage.classList.remove("show","landed");
        stepCount=f;
        turnHistory=[];
        phase="move";
        renderMovePanel();
        setTimeout(showNavMarkers,250);
      },750);
    }
  },70);

  // 初回描画＋落下アニメ
  box.innerHTML=diceSVG(Math.floor(Math.random()*6)+1);
  box.classList.add("rolling");
}

/* ===== サイコロ効果音（WebAudio・外部ファイル不要） ===== */
let audioCtx=null;
function getAudio(){
  if(!audioCtx){try{audioCtx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){return null;}}
  return audioCtx;
}
function playDiceSound(){
  const ac=getAudio(); if(!ac)return;
  // カラカラ：短いノイズパルスを数回
  for(let i=0;i<5;i++){
    setTimeout(()=>{
      const o=ac.createOscillator(),g=ac.createGain();
      o.type="square"; o.frequency.value=140+Math.random()*120;
      g.gain.setValueAtTime(0.0,ac.currentTime);
      g.gain.linearRampToValueAtTime(0.06,ac.currentTime+0.01);
      g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.08);
      o.connect(g); g.connect(ac.destination);
      o.start(); o.stop(ac.currentTime+0.09);
    },i*180);
  }
}
function playLandSound(){
  const ac=getAudio(); if(!ac)return;
  const o=ac.createOscillator(),g=ac.createGain();
  o.type="triangle"; o.frequency.setValueAtTime(520,ac.currentTime);
  o.frequency.exponentialRampToValueAtTime(180,ac.currentTime+0.18);
  g.gain.setValueAtTime(0.12,ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.25);
  o.connect(g); g.connect(ac.destination);
  o.start(); o.stop(ac.currentTime+0.26);
}

/* ======= 隣接ノード計算 ======= */
function neighbors(node){
  const res=[];
  const line=STATIONS[node.line];
  const isLoop=LOOP_LINES.includes(node.line);
  const from=STATIONS[node.line][node.idx];

  // 同一路線の前後（乗換なし）
  [+1,-1].forEach(d=>{
    let ni=node.idx+d;
    if(isLoop) ni=(ni+line.length)%line.length;
    if(ni>=0&&ni<line.length){
      const to=STATIONS[node.line][ni];
      res.push({line:node.line,idx:ni,station:to,isTransfer:false,via:null,
        bearing:Math.atan2(to.lat-from.lat,to.lng-from.lng)});
    }
  });

  // 乗換先：乗換先駅からさらに進める方向を展開
  const tr=TRANSFERS[`${node.line}:${node.idx}`];
  if(tr) tr.forEach(t=>{
    const viaLine=t.line, viaIdx=t.idx;
    const viaStation=STATIONS[viaLine][viaIdx];
    const viaIsLoop=LOOP_LINES.includes(viaLine);
    // 乗換先駅の前後（同一路線の前後）を「乗換してから進む先」として追加
    [+1,-1].forEach(d=>{
      let ni=viaIdx+d;
      if(viaIsLoop) ni=(ni+STATIONS[viaLine].length)%STATIONS[viaLine].length;
      if(ni>=0&&ni<STATIONS[viaLine].length){
        const to=STATIONS[viaLine][ni];
        // 乗換先駅と同じ場所を起点に方角計算
        res.push({line:viaLine,idx:ni,station:to,isTransfer:true,
          via:{line:viaLine,idx:viaIdx,station:viaStation},
          bearing:Math.atan2(to.lat-from.lat,to.lng-from.lng)});
      }
    });
  });
  return res;
}

/* ======= 地図上ナビマーカー ======= */
let navMarkers=[];
let pulseMarker=null;

const ARROW_FOR_DEG={right:"➡️",up:"⬆️",left:"⬅️",down:"⬇️"};
const DIR_PX={up:[0,-90],down:[0,90],left:[-90,0],right:[90,0]};

function bearingToDir(deg){
  if(deg>=-45&&deg<45)return"right";
  if(deg>=45&&deg<135)return"up";
  if(deg>=135||deg<-135)return"left";
  return"down";
}
function clearNavMarkers(){
  navMarkers.forEach(m=>map.removeLayer(m));
  navMarkers=[];
  if(pulseMarker){map.removeLayer(pulseMarker);pulseMarker=null;}
}

function showNavMarkers(){
  clearNavMarkers();
  if(phase!=="move") return;

  const cs=curS();
  const lineColor=LINE_META[cur.line].color;

  // 現在地パルスリング
  pulseMarker=L.marker([cs.lat,cs.lng],{
    icon:L.divIcon({className:"",
      html:`<div class="pulse-ring" style="color:${lineColor}"></div>`,
      iconSize:[40,40],iconAnchor:[20,20]}),
    interactive:false,zIndexOffset:900
  }).addTo(map);

  const nbs=neighbors(cur);

  // 方向ごとに候補リストを集める（複数可）
  const dirMap={}; // dir → [{neighbor}]
  const order=["right","up","left","down"];
  nbs.forEach(n=>{
    const deg=n.bearing*180/Math.PI;
    let dir=bearingToDir(deg);
    // 同一方向が既に埋まっている場合：同じ方向に追加（複数バブル）
    // ただし完全に同じ行き先は重複除去
    if(!dirMap[dir]) dirMap[dir]=[];
    const dup=dirMap[dir].some(x=>x.line===n.line&&x.idx===n.idx);
    if(!dup) dirMap[dir].push(n);
  });
  // 空き方向へのフォールバックはしない（同方向複数バブル方式に変更）

  const trainPt=map.latLngToContainerPoint([cs.lat,cs.lng]);

  order.forEach(dir=>{
    const [dx,dy]=DIR_PX[dir];
    const candidates=dirMap[dir]||[];
    const active=candidates.length>0;

    if(!active){
      // 不活性矢印
      const html=`<div class="nav-bubble" style="border-color:#bbb;opacity:0.25;cursor:default">
        <div class="nav-arrow">${ARROW_FOR_DEG[dir]}</div></div>`;
      const pt=L.point(trainPt.x+dx,trainPt.y+dy);
      const ll=map.containerPointToLatLng(pt);
      const m=L.marker(ll,{icon:L.divIcon({className:"nav-marker",html,iconSize:[null,null],iconAnchor:[30,30]}),
        zIndexOffset:950,interactive:false}).addTo(map);
      navMarkers.push(m);
      return;
    }

    // 同方向に複数候補：横に並べる（オフセット±30px）
    const n=candidates.length;
    candidates.forEach((cand,ci)=>{
      const spread=(ci-(n-1)/2)*64; // 方向と垂直にスプレッド
      const perpX=(dir==="up"||dir==="down")?spread:0;
      const perpY=(dir==="left"||dir==="right")?spread:0;

      const color=LINE_META[cand.line].color;
      const isBack=turnHistory.length>0&&
        turnHistory[turnHistory.length-1].line===cand.line&&
        turnHistory[turnHistory.length-1].idx===cand.idx;
      const trBadge=cand.isTransfer
        ?`<div class="nav-xfer" style="color:${color}">🔁${cand.via.station.name}</div>`:"";
      const lineBadge=cand.isTransfer
        ?`<div class="nav-line" style="color:${color}">${LINE_META[cand.line].short}</div>`
        :(cand.line!==cur.line?`<div class="nav-line" style="color:${color}">${LINE_META[cand.line].short}</div>`:"");
      const backBadge=isBack?`<div style="font-size:8px;color:#e65100">↩+1</div>`:"";
      const bg=isBack?"background:rgba(255,245,157,0.95)"
        :cand.isTransfer?"background:rgba(230,245,255,0.95)":"";

      const goArg=JSON.stringify({line:cand.line,idx:cand.idx,isTransfer:cand.isTransfer,via:cand.via});
      const html=`<div class="nav-bubble" style="border-color:${color};${bg}" onclick='window._go(${JSON.stringify(goArg)})'>
        <div class="nav-arrow">${ARROW_FOR_DEG[dir]}</div>
        <div class="nav-name">${cand.station.name}</div>
        ${lineBadge}${trBadge}${backBadge}
      </div>`;

      const pt=L.point(trainPt.x+dx+perpX,trainPt.y+dy+perpY);
      const ll=map.containerPointToLatLng(pt);
      const m=L.marker(ll,{
        icon:L.divIcon({className:"nav-marker",html,iconSize:[null,null],iconAnchor:[30,30]}),
        zIndexOffset:950,interactive:true
      }).addTo(map);
      navMarkers.push(m);
    });
  });
}

/* ======= 移動 ======= */
let turnHistory=[];

function _go(argJson){
  if(phase!=="move")return;
  const arg=JSON.parse(argJson);
  const {line:lineId,idx,isTransfer,via}=arg;
  clearNavMarkers();
  const fromS=curS();
  const nc={line:lineId,idx};
  const toS=STATIONS[nc.line][nc.idx];

  // 戻り判定（桃鉄方式）：直前にいた駅へ戻る場合はマス回復
  const isBack=turnHistory.length>0&&
    turnHistory[turnHistory.length-1].line===nc.line&&
    turnHistory[turnHistory.length-1].idx===nc.idx;

  if(isBack){
    stepCount++;            // 戻り→回復
    turnHistory.pop();
  } else {
    stepCount--;            // 前進（乗換経由も1駅進めば消費）
    // 乗換経由の場合は「乗換駅」を履歴に積む
    // → 目的駅から「戻る」矢印で乗換駅に戻ったとき回復できるように
    if(isTransfer && via){
      turnHistory.push({line:via.line, idx:via.idx});
    } else {
      turnHistory.push({line:cur.line, idx:cur.idx});
    }
  }

  phase="anim";

  const doMove=(fromLL,color,onDone)=>animateTrain(fromLL,[toS.lat,toS.lng],color,380,onDone);

  const finish=()=>{
    cur=nc;
    visited.add(`${cur.line}:${cur.idx}`);
    placeTrain(toS.lat,toS.lng,LINE_META[cur.line].color);
    renderChips();
    if(isGoal(cur)){clearNavMarkers();setTimeout(showWin,400);return;}
    if(stepCount<=0){
      clearNavMarkers();
      if(toS.fact){phase="popup";setTimeout(showFact,200);}
      else{phase="roll";renderRoll(false);}
    } else {
      updateStepCount();
      phase="move"; setTimeout(showNavMarkers,280);
    }
  };

  if(isTransfer&&via){
    // 乗換：まず乗換駅へワープ（アニメなし）→ then 目的駅へ移動
    const viaS=via.station;
    const viaColor=LINE_META[via.line].color;
    // 乗換駅で一旦電車を置く
    animateTrain([fromS.lat,fromS.lng],[viaS.lat,viaS.lng],viaColor,220,()=>{
      placeTrain(viaS.lat,viaS.lng,LINE_META[lineId].color);
      // 乗換駅からは少し間を置いて目的駅へ
      setTimeout(()=>{
        animateTrain([viaS.lat,viaS.lng],[toS.lat,toS.lng],LINE_META[lineId].color,280,finish);
      },100);
    });
  } else {
    doMove([fromS.lat,fromS.lng],LINE_META[cur.line].color,finish);
  }
}
window._go=_go;

/* ======= ルーレット ======= */
function getTransferStations(){
  // TRANSFERSキーから乗換可能駅を収集（スタート駅・現ゴール・現在地を除外）
  const seen=new Set();
  const result=[];
  for(const k of Object.keys(TRANSFERS)){
    const[line,idx]=k.split(":");
    const i=parseInt(idx);
    if(line===START_LINE&&i===START_IDX) continue;
    if(line===GOAL_LINE&&i===GOAL_IDX) continue;
    if(line===cur.line&&i===cur.idx) continue;
    const name=STATIONS[line][i].name;
    if(seen.has(name)) continue;
    seen.add(name);
    result.push({line,idx:i,name});
  }
  // シャッフル
  for(let i=result.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [result[i],result[j]]=[result[j],result[i]];
  }
  return result;
}

let rouletteCallback=null;

function showRoulette(title, onDecide){
  rouletteCallback=onDecide;
  const candidates=getTransferStations();
  if(!candidates.length) return;

  $("rouletteTitle").textContent=title;
  $("rouletteBtn").style.display="none";
  $("rouletteResult").textContent="";

  const track=$("rouletteTrack");
  // 無限ループ用に候補を複数周分並べる
  const items=[...candidates,...candidates,...candidates];
  track.innerHTML=items.map(c=>{
    const color=LINE_META[c.line].color;
    return `<div class="roulette-item"><span class="ri-line" style="background:${color}">${LINE_META[c.line].short}</span>${c.name}</div>`;
  }).join("");
  // ハイライト枠
  $("rouletteWindow").insertAdjacentHTML("beforeend",`<div class="highlight"></div>`);

  $("ovRoulette").classList.add("show");

  // アニメーション：高速→減速→停止
  const itemH=38;
  const total=items.length;
  const targetIdx=candidates.length + Math.floor(Math.random()*candidates.length);
  const finalY=-(targetIdx*itemH - (70/2 - itemH/2));

  let startTime=null;
  const duration=2800;
  // 初期位置：ランダムなオフセットから開始
  const startY=-(Math.floor(Math.random()*candidates.length)*itemH);
  track.style.transition="none";
  track.style.transform=`translateY(${startY}px)`;

  function easeOut(t){return 1-Math.pow(1-t,3);}
  function tick(ts){
    if(!startTime) startTime=ts;
    const t=Math.min((ts-startTime)/duration,1);
    const ease=easeOut(t);
    const y=startY+(finalY-startY)*ease;
    track.style.transition="none";
    track.style.transform=`translateY(${y}px)`;
    if(t<1){
      requestAnimationFrame(tick);
    } else {
      // 止まった
      const chosen=candidates[targetIdx % candidates.length];
      showRouletteResult(chosen);
    }
  }
  requestAnimationFrame(tick);
}

function showRouletteResult(chosen){
  const color=LINE_META[chosen.line].color;
  $("rouletteResult").innerHTML=
    `<div style="font-size:13px;margin-bottom:8px">つぎの めざす えき：</div>`+
    `<div style="font-size:22px;font-weight:900;color:${color}">${chosen.name}</div>`+
    `<div style="font-size:11px;color:#666;margin-top:4px">${LINE_META[chosen.line].name}</div>`;
  $("rouletteBtn").style.display="flex";
  $("rouletteBtn").style.flexDirection="column";
  $("rouletteBtn").style.gap="10px";
  $("rouletteOk").onclick=()=>{
    // ハイライト枠を削除
    const hl=$("rouletteWindow").querySelector(".highlight");
    if(hl) hl.remove();
    $("ovRoulette").classList.remove("show");
    GOAL_LINE=chosen.line; GOAL_IDX=chosen.idx;
    updateGoalMarker();
    renderChips();
    if(rouletteCallback) rouletteCallback(chosen);
  };
}

// quiz.jsonを読み込んでSTATIONSに注入してからゲーム開始
async function initGame(){
  try{
    const res=await fetch("quiz.json");
    if(res.ok){
      const quizData=await res.json();
      // 各路線の各駅にfact/quizを注入
      for(const stns of Object.values(STATIONS)){
        for(const s of stns){
          if(quizData[s.name]){
            s.fact=quizData[s.name].fact||null;
            s.quiz=quizData[s.name].quiz||null;
          }
        }
      }
      console.log(`quiz.json読み込み完了: ${Object.keys(quizData).length}駅分`);
    }
  }catch(e){
    console.warn("quiz.json読み込み失敗（クイズなしで続行）:", e);
  }

  const s0=curS();
  placeTrain(s0.lat,s0.lng,LINE_META[cur.line].color);
  renderChips(); renderRoll(true);
  updateGoalMarker();
  setTimeout(()=>focusPlayer(false),300);
  map.on("moveend zoomend",()=>{if(phase==="move") showNavMarkers();});

  setTimeout(()=>{
    showRoulette("🎯 めざす えきを きめよう！",()=>{
      renderRoll(false);
    });
  },600);
}
initGame();
</script>
</body>
</html>
