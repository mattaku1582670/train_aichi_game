  width:100%;min-height:62px;justify-content:center;transition:transform .08s;}
.arrow:active{transform:scale(.95);}
.arrow-up{grid-column:2;grid-row:1;}
.arrow-left{grid-column:1;grid-row:2;}
.arrow-right{grid-column:3;grid-row:2;}
.arrow-down{grid-column:2;grid-row:3;}

.tbtn:active{transform:scale(.97);}
#legend{flex:0 0 auto;background:var(--br);display:flex;gap:8px;padding:5px 14px;flex-wrap:wrap;z-index:500;}

#legend .bar{width:16px;height:5px;border-radius:3px;}
#legend span{font-size:10px;color:#fff;}
.overlay{position:fixed;inset:0;z-index:1000;background:#000a;display:none;

.overlay.show{display:flex;animation:fade .35s;}

.quiz-q{font-size:18px;font-weight:800;text-align:center;margin:6px 0;}

.bigbtn:active{transform:translateY(3px);}
.train-wrap{position:absolute;pointer-events:none;z-index:900;}

const LINE_META={"meitetsu":{"name":"名鉄名古屋本線","short":"名鉄本線","color":"#e3342f"},"tokaido":{"name":"JR東海道本線","short":"JR東海道","color":"#f59e0b"},"chuo":{"name":"JR中央本線","short":"JR中央","color":"#2563eb"},"higashiyama":{"name":"地下鉄東山線","short":"東山線","color":"#eab308"},"meijo":{"name":"地下鉄名城線","short":"名城線","color":"#9333ea"},"tsurumai":{"name":"地下鉄鶴舞線","short":"鶴舞線","color":"#00bcd4"},"sakuradori":{"name":"地下鉄桜通線","short":"桜通線","color":"#c4002f"},"seto":{"name":"名鉄瀬戸線","short":"瀬戸線","color":"#e3342f"},"aikan":{"name":"愛知環状鉄道","short":"愛環","color":"#1565c0"},"linimo":{"name":"リニモ","short":"リニモ","color":"#7ac143"},"mikawa":{"name":"名鉄三河線","short":"三河線","color":"#e3342f"},"toyota":{"name":"名鉄豊田線","short":"豊田線","color":"#e3342f"},"tsushima":{"name":"名鉄津島線","short":"津島線","color":"#e3342f"},"inuyama":{"name":"名鉄犬山線","short":"犬山線","color":"#e3342f"},"komaki":{"name":"名鉄小牧線","short":"小牧線","color":"#e3342f"},"kamiiida":{"name":"地下鉄上飯田線","short":"上飯田線","color":"#f8bbd0"}};
const GOAL_LINE="meitetsu", GOAL_IDX=59;
const LOOP_LINES=["meijo"];
const DICE=["","⚀","⚁","⚂","⚃","⚄","⚅"];
const GOOGLE_MAPS_API_KEY=""; // ← キーを入れるとGoogle Mapsになる

/* ======= ドット絵電車 ======= */
const ART=[
  "0000000000000000","0033333333333300","0311111111111130","3111111111111113",
  "3122112211221113","3122112211221143","3111111111111113","3166666666666613",
  "3111111111111113","3111111111111113","0350000000000530","0055000000005500",
];
function shade(hex,amt){
  let c=hex.replace("#","");
  if(c.length===3)c=[...c].map(x=>x+x).join("");
  return "#"+[0,2,4].map(i=>Math.max(0,Math.min(255,parseInt(c.slice(i,i+2),16)+amt))
    .toString(16).padStart(2,"0")).join("");
}
function makeTrainDataURL(color){
  const dark=shade(color,-40),light=shade(color,35);
  const pal={"0":null,"1":color,"2":"#bfe9ff","3":dark,"4":"#fff7b0","5":"#444","6":light};
  const S=4,cv=document.createElement("canvas");
  cv.width=16*S;cv.height=12*S;
  const ctx=cv.getContext("2d");
  ART.forEach((row,y)=>[...row].forEach((ch,x)=>{
    const col=pal[ch];if(!col)return;
    ctx.fillStyle=col;ctx.fillRect(x*S,y*S,S,S);
  }));
  return cv.toDataURL();
}

/* ======= 地図初期化 ======= */
const map=L.map("map",{zoomControl:true,zoomSnap:.25}).setView([35.17,136.93],11);
if(GOOGLE_MAPS_API_KEY){
  L.tileLayer(`https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}&key=${GOOGLE_MAPS_API_KEY}`,

}else{

/* 路線ライン */
for(const[lid,meta]of Object.entries(LINE_META)){
  const pts=STATIONS[lid].map(s=>[s.lat,s.lng]);
  // 環状線は先頭に戻して線路を閉じる
  if(LOOP_LINES.includes(lid)) pts.push(pts[0]);
  L.polyline(pts,{color:meta.color,weight:5,opacity:.85,lineJoin:"round",lineCap:"round"}).addTo(map);
}

/* 駅マーカー */
const allLL=[];
const stnMarkers={};
for(const[lid,stns]of Object.entries(STATIONS)){
  const color=LINE_META[lid].color;
  stns.forEach((s,i)=>{
    const ll=[s.lat,s.lng]; allLL.push(ll);
    const isGoal=lid===GOAL_LINE&&i===GOAL_IDX;
    const isTr=!!TRANSFERS[`${lid}:${i}`];
    const sz=isGoal?18:isTr?12:8;
    const dot=isGoal
      ?`<div style="width:${sz}px;height:${sz}px;border-radius:50%;background:#f5c518;border:3px solid #fff;box-shadow:0 0 8px #f5c518aa"></div>`
      :`<div style="width:${sz}px;height:${sz}px;border-radius:50%;background:${color};border:2px solid #fff;box-shadow:0 1px 3px #0005"></div>`;
    const m=L.marker(ll,{icon:L.divIcon({className:"",html:dot,iconSize:[sz,sz],iconAnchor:[sz/2,sz/2]}),interactive:false}).addTo(map);
    if(!stnMarkers[`${lid}:${i}`])stnMarkers[`${lid}:${i}`]=[];
    stnMarkers[`${lid}:${i}`].push(m);
    // ラベル（乗換駅・ゴールのみ）
    if(isGoal||isTr){
      L.marker(ll,{icon:L.divIcon({className:"",
        html:`<div style="font-size:9px;font-weight:800;color:#1a1410;white-space:nowrap;text-shadow:0 0 3px #fff,0 0 3px #fff,0 0 3px #fff">${s.name}</div>`,
        iconAnchor:[-(sz/2)-2,4]}),interactive:false}).addTo(map);
    }
  });
}
const allBounds=L.latLngBounds(allLL);

/* ======= 電車マーカー（アニメーション付き） ======= */
let trainMarker=null;
let curTrainDataURL=null;

function getTrainIcon(color){
  const url=makeTrainDataURL(color);
  curTrainDataURL=url;
  return L.divIcon({className:"",
    html:`<img src="${url}" width="56" height="42" style="image-rendering:pixelated;filter:drop-shadow(0 3px 2px #0006);transform:translate(-50%,-100%)">`,
    iconSize:[56,42],iconAnchor:[28,42]});
}

function placeTrain(lat,lng,color){
  const ll=[lat,lng];
  const icon=getTrainIcon(color);
  if(trainMarker){trainMarker.setLatLng(ll);trainMarker.setIcon(icon);}
  else{trainMarker=L.marker(ll,{icon,zIndexOffset:1000,interactive:false}).addTo(map);}
}

/* 駅間アニメーション移動 */
function animateTrain(fromLL,toLL,color,durationMs,onDone){
  const steps=30;
  const dlat=(toLL[0]-fromLL[0])/steps;
  const dlng=(toLL[1]-fromLL[1])/steps;
  let step=0;
  const iv=setInterval(()=>{
    step++;
    const lat=fromLL[0]+dlat*step;
    const lng=fromLL[1]+dlng*step;
    if(trainMarker) trainMarker.setLatLng([lat,lng]);
    if(followMode) map.panTo([lat,lng],{animate:false});
    if(step>=steps){clearInterval(iv);onDone();}
  },durationMs/steps);
}

/* ======= ゲーム状態 ======= */
let cur={line:"meitetsu",idx:0};
let visited=new Set(["meitetsu:0"]);
let coins=0,phase="roll",stepCount=0,quizAnswered=false;
let followMode=true;
const $=id=>document.getElementById(id);

function curS(){return STATIONS[cur.line][cur.idx];}
function isGoal(c){return c.line===GOAL_LINE&&c.idx===GOAL_IDX;}

/* ビュー切替 */
const viewBtn=$("viewBtn");
viewBtn.addEventListener("click",()=>{
  followMode=!followMode;
  if(followMode){viewBtn.textContent="🔍 ぜんたいを みる";focusPlayer(true);}
  else{viewBtn.textContent="🚃 じぶんに よる";map.fitBounds(allBounds,{padding:[40,40]});}
});
function focusPlayer(animate){
  const s=curS();
  map.setView([s.lat,s.lng],14,{animate:!!animate});
}

/* ======= UI描画 ======= */
function renderChips(){
  const meta=LINE_META[cur.line];
  const s=curS();
  const remain=cur.line==="meitetsu"?(GOAL_IDX-cur.idx)+"駅":"のりかえてね";
  $("chips").innerHTML=
    `<span class="chip line" style="background:${meta.color}">${meta.short}</span>`+
    `<span class="chip">いま：<b>${s.name}</b></span>`+
    `<span class="chip">ゴールまで <b>${remain}</b></span>`;
  $("coins").textContent="🪙 "+coins;
}
function renderRoll(disabled){
  $("action").innerHTML=
    `<div class="controls"><button id="roll" ${disabled?"disabled":""}>🎲 サイコロを ふる！</button><div id="die">🎲</div></div>`;
  $("roll").onclick=rollDice;
}

/* ======= サイコロ ======= */
function rollDice(){
  if(phase!=="roll")return;
  phase="anim"; renderRoll(true);
  const die=$("die"); die.classList.add("shake");
  let n=0;
  const iv=setInterval(()=>{
    const r=Math.floor(Math.random()*6)+1; die.textContent=DICE[r];
    if(++n>9){
      clearInterval(iv); die.classList.remove("shake");
      const f=Math.floor(Math.random()*6)+1; die.textContent=DICE[f];
      stepCount=f;
      lastNode=null; // 新ターンは戻り方向の記録をリセット
      phase="move";
      setTimeout(showDirections,350);
    }
  },65);
}

/* ======= 隣接ノード計算 ======= */
// 現在地から1歩で行ける駅(同一路線の前後＋乗換先)を集め、方角で矢印化
function neighbors(node){
  const res=[]; // {line,idx,label,bearing}
  const line=STATIONS[node.line];
  const isLoop=LOOP_LINES.includes(node.line);
  // 同一路線の前後
  [+1,-1].forEach(d=>{
    let ni=node.idx+d;
    if(isLoop) ni=(ni+line.length)%line.length;
    if(ni>=0&&ni<line.length) res.push({line:node.line,idx:ni});
  });
  // 乗換先
  const tr=TRANSFERS[`${node.line}:${node.idx}`];
  if(tr) tr.forEach(t=>res.push({line:t.line,idx:t.idx}));
  // 方角を計算
  const from=STATIONS[node.line][node.idx];
  res.forEach(r=>{
    const to=STATIONS[r.line][r.idx];
    const dx=(to.lng-from.lng), dy=(to.lat-from.lat);
    r.bearing=Math.atan2(dy,dx); // ラジアン
    r.station=to;
  });
  return res;
}
// bearingを上下左右に割当（重複時はずらす）
function assignArrows(nbs){
  // 角度→方向: 右(0),上(90),左(180),下(-90)付近
  const dirs={right:null,up:null,left:null,down:null};
  const cand=nbs.map(n=>{
    const deg=n.bearing*180/Math.PI;
    let pref;
    if(deg>=-45&&deg<45) pref="right";
    else if(deg>=45&&deg<135) pref="up";
    else if(deg>=135||deg<-135) pref="left";
    else pref="down";
    return {...n,pref,deg};
  });
  const order=["right","up","left","down"];
  // 各方向に最も近いものを割当、埋まっていたら空き方向へ
  cand.forEach(c=>{
    if(dirs[c.pref]===null){dirs[c.pref]=c;return;}
    // 空き方向を探す（近い順）
    for(const d of order){ if(dirs[d]===null){dirs[d]=c;return;} }
  });
  return dirs;
}

/* ======= 移動 ======= */
let lastNode=null; // 直前にいた駅（戻り判定用）
function showDirections(){
  const nbs=neighbors(cur);
  const dirs=assignArrows(nbs);
  renderArrows(dirs);
}
function renderArrows(dirs){
  const arrowMeta={up:{sym:"⬆️",pos:"up"},down:{sym:"⬇️",pos:"down"},left:{sym:"⬅️",pos:"left"},right:{sym:"➡️",pos:"right"}};
  let btns="";
  for(const[d,n]of Object.entries(dirs)){
    if(!n)continue;
    const c=LINE_META[n.line].color;
    const lineLabel = n.line!==cur.line ? `<span style="font-size:9px;display:block;color:${c}">${LINE_META[n.line].short}</span>`:"";
    btns+=`<button class="arrow arrow-${d}" style="border-color:${c}" onclick="_go('${n.line}',${n.idx})">
      <span style="font-size:24px">${arrowMeta[d].sym}</span>
      <span style="font-size:11px;font-weight:800">${n.station.name}</span>${lineLabel}</button>`;
  }
  $("action").innerHTML=
    `<div class="move-head">🎲 のこり <b>${stepCount}</b> マス｜どっちに すすむ？</div>
     <div class="arrow-grid">${btns}</div>`;
}
function _go(lineId,idx){
  if(phase!=="move")return;
  const fromS=curS();
  const prevNode={line:cur.line,idx:cur.idx};
  const nc={line:lineId,idx:idx};
  const toS=STATIONS[nc.line][nc.idx];
  const color=LINE_META[nc.line].color;
  stepCount--;
  phase="anim";
  animateTrain([fromS.lat,fromS.lng],[toS.lat,toS.lng],color,400,()=>{
    lastNode=prevNode;
    cur=nc;
    visited.add(`${cur.line}:${cur.idx}`);
    placeTrain(toS.lat,toS.lng,color);
    renderChips();
    if(isGoal(cur)){setTimeout(showWin,400);return;}
    if(stepCount<=0){
      // 停止：豆知識/クイズ→次ターン
      if(toS.fact){phase="popup";setTimeout(showFact,200);}
      else{phase="roll";renderRoll(false);}
    } else {
      phase="move"; setTimeout(showDirections,250);
    }
  });
}
window._go=_go;

/* ======= 豆知識 / クイズ ======= */
function showFact(){
  const s=curS();
  $("popupCard").innerHTML=
    `<div class="stn">📍 ${s.name}</div>`+
    (s.fact?`<div style="font-size:36px;text-align:center">🚉</div><div class="fact-box">💡 ${s.fact}</div>`:`<div style="text-align:center;font-size:14px">⬇️ のりかえ駅です</div>`)+
    `<button class="bigbtn" style="background:var(--gn);box-shadow:0 4px 0 var(--gnd)" onclick="_afterFact()">${s.quiz?"クイズに ちょうせん！ ▶":"つぎへ ▶"}</button>`;
  $("ovPopup").classList.add("show");
}
function _afterFact(){
  const s=curS();
  if(s.quiz){showQuiz();}else{closePopup();}
}
function showQuiz(){
  quizAnswered=false;
  const q=curS().quiz;
  const opts=q.a.map((o,i)=>`<button class="qopt" onclick="_ans(${i})">${o}</button>`).join("");
  $("popupCard").innerHTML=
    `<div class="stn">📍 ${curS().name}</div>`+
    `<div class="quiz-type">${q.type}クイズ</div>`+
    `<div class="quiz-q">${q.q}</div>`+
    `<div class="qopts" id="qopts">${opts}</div>`+
    `<div id="qresult"></div>`;
}
function _ans(i){
  if(quizAnswered)return; quizAnswered=true;
  const q=curS().quiz;
  document.querySelectorAll("#qopts .qopt").forEach((b,bi)=>{
    b.disabled=true;
    if(bi===q.c){b.style.background="#c8e6c9";b.style.borderColor="#4caf50";}
    else if(bi===i){b.style.background="#ffcdd2";b.style.borderColor="#e53935";}
  });
  const ok=i===q.c;
  if(ok){coins++;$("coins").textContent="🪙 "+coins;}
  $("qresult").innerHTML=
    `<div class="result" style="color:${ok?"#2e7d32":"#c62828"}">${ok?"🎉 せいかい！ コイン +1":"ざんねん… また がんばろう！"}</div>`+
    `<button class="bigbtn" style="background:var(--og);box-shadow:0 4px 0 var(--ogd);margin-top:8px" onclick="_closePopup()">つぎへ ▶</button>`;
}
function closePopup(){
  $("ovPopup").classList.remove("show");
  phase="roll"; renderRoll(false);
}
window._afterFact=_afterFact; window._ans=_ans; window._closePopup=closePopup;

/* ======= 勝利 ======= */
function showWin(){
  $("winCard").innerHTML=
    `<div style="font-size:64px">⛩🎉</div>`+
    `<div style="font-size:26px;font-weight:900;color:var(--og)">ゴール！</div>`+
    `<div style="font-size:15px;line-height:1.7"><b>めいてつぎふ</b> に とうちゃく！<br>あつめたコイン 🪙 <b>${coins}</b>こ！</div>`+
    `<button class="bigbtn" style="background:var(--gn);box-shadow:0 4px 0 var(--gnd)" onclick="location.reload()">もういちど あそぶ 🔄</button>`;
  $("ovWin").classList.add("show");
}

/* ======= 凡例 ======= */
$("legend").innerHTML=Object.values(LINE_META).map(m=>
  `<div class="item"><div class="bar" style="background:${m.color}"></div><span>${m.short}</span></div>`).join("");

/* ======= 初期化 ======= */
const s0=curS();
placeTrain(s0.lat,s0.lng,LINE_META[cur.line].color);
renderChips(); renderRoll(false);
setTimeout(()=>focusPlayer(false),300);
</script>
