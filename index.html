<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>あいち でんしゃ すごろく</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  :root{
    --orange:#ff7043; --orange-d:#e64a19; --green:#4caf50; --green-d:#2e7d32;
    --cream:#fff7e6; --brown:#5d4037;
  }
  html,body{height:100%;overflow:hidden;
    font-family:"M PLUS Rounded 1c","Hiragino Maru Gothic ProN","Rounded Mplus 1c",sans-serif;
    background:#cfe3ea;user-select:none;-webkit-user-select:none;}
  #app{display:flex;flex-direction:column;height:100dvh;}

  header{flex:0 0 auto;background:var(--orange);color:#fff;
    padding:10px 14px;display:flex;align-items:center;gap:10px;box-shadow:0 3px 0 var(--orange-d);z-index:500;}
  header .title{line-height:1.1;}
  header .title b{font-size:17px;font-weight:800;display:block;}
  header .title span{font-size:10px;opacity:.92;}
  #coins{margin-left:auto;background:#fff;color:var(--orange);border-radius:999px;
    padding:5px 13px;font-weight:800;font-size:15px;box-shadow:0 2px 0 var(--orange-d);}

  #map{flex:1 1 auto;background:#cfe3ea;z-index:1;}
  .leaflet-container{font-family:inherit;background:#cfe3ea;}

  /* ビュー切替ボタン */
  #viewBtn{position:absolute;top:64px;right:12px;z-index:600;
    background:#fff;border:3px solid var(--orange);color:var(--orange);
    border-radius:12px;padding:8px 12px;font-size:13px;font-weight:800;
    font-family:inherit;cursor:pointer;box-shadow:0 3px 0 #0002;}
  #viewBtn:active{transform:translateY(2px);box-shadow:none;}

  /* パネル */
  #panel{flex:0 0 auto;background:#fff;border-top:4px solid #ffb74d;
    padding:10px 14px 14px;display:flex;flex-direction:column;gap:8px;z-index:500;}
  .chips{display:flex;gap:6px;flex-wrap:wrap;}
  .chip{display:inline-flex;align-items:center;gap:4px;background:#fff3e0;color:var(--brown);
    border:2px solid #ffcc80;border-radius:999px;padding:4px 11px;font-size:13px;font-weight:700;}
  .chip.line{border:none;color:#fff;}
  .chip b{font-weight:800;}

  .controls{display:flex;gap:10px;}
  #roll{flex:1;background:var(--green);color:#fff;border:none;border-radius:14px;
    font-size:19px;font-weight:800;padding:15px 0;cursor:pointer;
    box-shadow:0 4px 0 var(--green-d);font-family:inherit;}
  #roll:disabled{background:#aaa;box-shadow:none;cursor:default;}
  #roll:active:not(:disabled){transform:translateY(4px);box-shadow:none;}
  #die{width:66px;background:#fffde7;border:3px solid #fbc02d;border-radius:16px;
    display:flex;align-items:center;justify-content:center;font-size:38px;}
  #die.shake{animation:shake .5s linear;}
  @keyframes shake{0%,100%{transform:rotate(0)}25%{transform:rotate(-15deg) scale(1.1)}50%{transform:rotate(12deg)}75%{transform:rotate(-8deg)}}

  .transfer .q{font-size:13px;font-weight:700;margin-bottom:6px;}
  .transfer .opts{display:flex;flex-wrap:wrap;gap:6px;}
  .tbtn{background:#fff;border-radius:12px;padding:9px 13px;font-size:13px;font-weight:800;
    cursor:pointer;font-family:inherit;border-width:3px;border-style:solid;}

  /* 凡例 */
  #legend{flex:0 0 auto;background:var(--brown);display:flex;gap:8px;padding:5px 14px;flex-wrap:wrap;z-index:500;}
  #legend .item{display:flex;align-items:center;gap:4px;}
  #legend .bar{width:16px;height:5px;border-radius:3px;}
  #legend span{font-size:10px;color:#fff;}

  /* オーバーレイ（豆知識・クイズ・勝利） */
  .overlay{position:fixed;inset:0;z-index:1000;background:#000a;display:none;
    align-items:center;justify-content:center;padding:18px;}
  .overlay.show{display:flex;animation:fade .35s;}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .card{background:#fff;border-radius:20px;padding:18px;max-width:360px;width:100%;
    display:flex;flex-direction:column;gap:10px;box-shadow:0 10px 40px #0006;}
  .card .stn{font-size:13px;color:var(--orange);font-weight:800;}
  .card .fact{font-size:14px;line-height:1.7;background:#fff8e1;padding:12px;border-radius:12px;}
  .quiz-type{align-self:center;background:#e3f2fd;color:#1565c0;border-radius:999px;
    padding:2px 12px;font-size:12px;font-weight:700;}
  .quiz-q{font-size:18px;font-weight:800;text-align:center;margin:6px 0;}
  .qopts{display:flex;flex-direction:column;gap:8px;}
  .qopt{background:#fff;border:3px solid #ffb74d;border-radius:12px;padding:12px;
    font-size:17px;font-weight:800;cursor:pointer;font-family:inherit;}
  .qopt:disabled{cursor:default;}
  .result{text-align:center;font-size:16px;font-weight:800;}
  .bigbtn{color:#fff;border:none;border-radius:14px;padding:13px;font-size:16px;
    font-weight:800;cursor:pointer;font-family:inherit;}
  .bigbtn:active{transform:translateY(3px);}

  /* ドット絵電車キャラ */
  .train-icon{image-rendering:pixelated;filter:drop-shadow(0 3px 2px #0006);}
</style>

/* ============ ドット絵電車を描く ============ */
function makeTrainIcon(color){
  // 16x12 ドット絵。スケール4倍 → 64x48
  const art=[
    "0000000000000000",
    "0033333333333300",
    "0311111111111130",
    "3111111111111113",
    "3122112211221113",
    "3122112211221143",
    "3111111111111113",
    "3166666666666613",
    "3111111111111113",
    "3111111111111113",
    "0350000000000530",
    "0055000000005500",
  ];
  const dark = shade(color,-40), light = shade(color,35);
  const palette={
    "0":null, "1":color, "2":"#bfe9ff", "3":dark, "4":"#fff7b0", "5":"#444", "6":light
  };
  const S=4, W=16*S, H=12*S;
  const cv=document.createElement("canvas"); cv.width=W; cv.height=H;
  const ctx=cv.getContext("2d");
  art.forEach((row,y)=>{
    [...row].forEach((ch,x)=>{
      const col=palette[ch]; if(!col) return;
      ctx.fillStyle=col; ctx.fillRect(x*S,y*S,S,S);
    });
  });
  return cv.toDataURL();
}
function shade(hex,amt){
  let c=hex.replace("#","");
  if(c.length===3)c=c.split("").map(x=>x+x).join("");
  let r=parseInt(c.slice(0,2),16),g=parseInt(c.slice(2,4),16),b=parseInt(c.slice(4,6),16);
  r=Math.max(0,Math.min(255,r+amt));g=Math.max(0,Math.min(255,g+amt));b=Math.max(0,Math.min(255,b+amt));
  return "#"+[r,g,b].map(v=>v.toString(16).padStart(2,"0")).join("");
}

} else {

  tileLayer=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',

}
tileLayer.addTo(map);

/* 路線ポリライン */

}
/* 駅マーカー */
const allLatLngs=[];
for(const [lid,line] of Object.entries(LINES)){
  line.stations.forEach((s,i)=>{
    const ll=[COORD[s.name].lat,COORD[s.name].lng]; allLatLngs.push(ll);
    const goal=lid===GOAL_LINE&&i===GOAL_IDX;
    const tr=!!TRANSFERS[`${lid}:${i}`];
    const size=goal?20:tr?15:11;
    const html=goal
      ? `<div style="width:${size}px;height:${size}px;border-radius:50%;background:#f5c518;border:3px solid #fff;box-shadow:0 0 8px #f5c518;display:flex;align-items:center;justify-content:center;font-size:11px">⛩</div>`
      : `<div style="width:${size}px;height:${size}px;border-radius:50%;background:${line.color};border:2px solid #fff;box-shadow:0 1px 3px #0006"></div>`;
    L.marker(ll,{icon:L.divIcon({className:'',html,iconSize:[size,size],iconAnchor:[size/2,size/2]}),interactive:false}).addTo(map);
    L.marker(ll,{icon:L.divIcon({className:'',
      html:`<div style="font-size:10px;font-weight:800;color:#1a1410;white-space:nowrap;text-shadow:0 0 3px #fff,0 0 3px #fff,0 0 3px #fff">${s.name}</div>`,
      iconAnchor:[-(size/2)-2,6]}),interactive:false}).addTo(map);
  });
}
const allBounds=L.latLngBounds(allLatLngs);

/* プレイヤー（ドット絵電車） */
let cur={line:"meitetsu",idx:0};
let trainMarker;
function placeTrain(){
  const s=LINES[cur.line].stations[cur.idx];
  const ll=[COORD[s.name].lat,COORD[s.name].lng];
  const url=makeTrainIcon(LINES[cur.line].color);
  const icon=L.divIcon({className:'',
    html:`<img src="${url}" class="train-icon" width="56" height="42" style="transform:translate(-50%,-100%)">`,
    iconSize:[56,42],iconAnchor:[28,42]});
  if(trainMarker) trainMarker.setLatLng(ll), trainMarker.setIcon(icon);
  else trainMarker=L.marker(ll,{icon,zIndexOffset:1000}).addTo(map);
}

/* ビュー制御 */
let followMode=true;
function focusPlayer(animate=true){
  const s=LINES[cur.line].stations[cur.idx];
  map.setView([COORD[s.name].lat,COORD[s.name].lng], 14, {animate});
}
document.getElementById('viewBtn').addEventListener('click',()=>{
  followMode=!followMode;
  const btn=document.getElementById('viewBtn');
  if(followMode){btn.textContent="🔍 ぜんたいを みる";focusPlayer();}
  else{btn.textContent="🚃 じぶんに よる";map.fitBounds(allBounds,{padding:[40,40]});}
});

/* ============ ゲーム状態・UI ============ */
let visited=new Set(["meitetsu:0"]);
let coins=0, phase="roll", pendingTransfers=[], stepCount=0, quizAnswered=false;
const $=id=>document.getElementById(id);

function isGoal(c){return c.line===GOAL_LINE&&c.idx===GOAL_IDX;}
function curStn(){return LINES[cur.line].stations[cur.idx];}

function renderChips(){
  const line=LINES[cur.line];
  const remain=cur.line==="meitetsu"?(GOAL_IDX-cur.idx)+"駅":"のりかえてね";
  $('chips').innerHTML=
    `<span class="chip line" style="background:${line.color}">${line.short}</span>`+
    `<span class="chip">いま：<b>${curStn().name}</b></span>`+
    `<span class="chip">ゴールまで <b>${remain}</b></span>`;
}
function renderRoll(){
  $('action').innerHTML=
    `<div class="controls">
      <button id="roll">🎲 サイコロを ふる！</button>
      <div id="die">${phase==="anim"?"🎲":"🎲"}</div>
    </div>`;
  $('roll').onclick=rollDice;
  $('roll').disabled = phase!=="roll";
}
function renderTransfer(){
  const line=LINES[cur.line];
  let opts=`<button class="tbtn" style="border-color:${line.color};color:${line.color}" onclick="window.__stay()">このまま ${line.short}</button>`;
  pendingTransfers.forEach((t,i)=>{
    const c=LINES[t.line].color;
    opts+=`<button class="tbtn" style="border-color:${c};color:${c}" onclick="window.__transfer(${i})">${LINES[t.line].short}に のりかえ</button>`;
  });
  $('action').innerHTML=`<div class="transfer"><div class="q">🔁 のりかえ駅！ どのでんしゃに のる？</div><div class="opts">${opts}</div></div>`;
}

function rollDice(){
  if(phase!=="roll")return;
  phase="anim"; renderRoll();
  const die=$('die'); die.classList.add('shake');
  let n=0;
  const iv=setInterval(()=>{
    const r=Math.floor(Math.random()*6)+1; die.textContent=DICE[r];
    if(++n>9){
      clearInterval(iv); die.classList.remove('shake');
      const f=Math.floor(Math.random()*6)+1; die.textContent=DICE[f];
      stepCount=f;
      setTimeout(()=>step(),350);
    }
  },65);
}

function step(){
  const line=LINES[cur.line];
  let ni=cur.idx+1;
  if(ni>=line.stations.length) ni=cur.idx-1;
  if(ni<0){phase="roll";renderRoll();return;}
  cur={line:cur.line,idx:ni};
  visited.add(`${cur.line}:${cur.idx}`);
  placeTrain();
  if(followMode) focusPlayer();
  renderChips();
  stepCount--;

  if(isGoal(cur)){setTimeout(showWin,500);return;}
  if(stepCount<=0){
    setTimeout(()=>showFact(),480);
  }else{
    setTimeout(()=>step(),450);
  }
}

/* 豆知識 → クイズ */
function showFact(){
  phase="popup";
  const s=curStn();
  $('popupCard').innerHTML=
    `<div class="stn">📍 ${s.name}（${s.yomi}）</div>
     <div style="font-size:40px;text-align:center;margin:4px 0">🚉</div>
     <div class="fact">💡 ${s.fact}</div>
     <button class="bigbtn" style="background:var(--green);box-shadow:0 4px 0 var(--green-d)" onclick="window.__afterFact()">${s.quiz?"クイズに ちょうせん！ ▶":"つぎへ ▶"}</button>`;
  $('ovPopup').classList.add('show');
}
window.__afterFact=function(){
  const s=curStn();
  if(s.quiz){showQuiz();}else{closePopupThenNext();}
};
function showQuiz(){
  quizAnswered=false;
  const q=curStn().quiz;
  let opts="";
  q.a.forEach((o,i)=>{opts+=`<button class="qopt" onclick="window.__answer(${i})">${o}</button>`;});
  $('popupCard').innerHTML=
    `<div class="stn">📍 ${curStn().name}</div>
     <div class="quiz-type">${q.type}クイズ</div>
     <div class="quiz-q">${q.q}</div>
     <div class="qopts" id="qopts">${opts}</div>
     <div id="qresult"></div>`;
}
window.__answer=function(i){
  if(quizAnswered)return; quizAnswered=true;
  const q=curStn().quiz;
  const btns=document.querySelectorAll('#qopts .qopt');
  btns.forEach((b,bi)=>{
    b.disabled=true;
    if(bi===q.c){b.style.background="#c8e6c9";b.style.borderColor="#4caf50";}
    else if(bi===i){b.style.background="#ffcdd2";b.style.borderColor="#e53935";}
  });
  const ok=i===q.c;
  if(ok){coins++;$('coins').textContent="🪙 "+coins;}
  $('qresult').innerHTML=
    `<div class="result" style="color:${ok?'#2e7d32':'#c62828'};margin-top:6px">${ok?"🎉 せいかい！ コイン +1":"ざんねん… また がんばろう！"}</div>
     <button class="bigbtn" style="background:var(--orange);box-shadow:0 4px 0 var(--orange-d);margin-top:8px" onclick="window.__closePopup()">つぎへ ▶</button>`;
};
window.__closePopup=closePopupThenNext;
function closePopupThenNext(){
  $('ovPopup').classList.remove('show');
  const key=`${cur.line}:${cur.idx}`;
  if(TRANSFERS[key]){pendingTransfers=TRANSFERS[key];phase="transfer";renderTransfer();}
  else{phase="roll";renderRoll();}
}

window.__stay=function(){phase="roll";renderRoll();};
window.__transfer=function(i){
  const t=pendingTransfers[i];
  cur={line:t.line,idx:t.idx};
  visited.add(`${t.line}:${t.idx}`);
  placeTrain(); if(followMode)focusPlayer(); renderChips();
  if(isGoal(cur)){showWin();return;}
  phase="roll"; renderRoll();
};

function showWin(){
  $('winCard').innerHTML=
    `<div style="font-size:64px">⛩🎉</div>
     <div style="font-size:26px;font-weight:900;color:var(--orange)">ゴール！</div>
     <div style="font-size:15px;line-height:1.7"><b>めいてつぎふ</b> に とうちゃく！<br>あつめたコイン 🪙 <b>${coins}</b>こ！</div>
     <button class="bigbtn" style="background:var(--green);box-shadow:0 4px 0 var(--green-d)" onclick="location.reload()">もういちど あそぶ 🔄</button>`;
  $('ovWin').classList.add('show');
}

/* 凡例 */
$('legend').innerHTML=Object.values(LINES).map(l=>
  `<div class="item"><div class="bar" style="background:${l.color}"></div><span>${l.short}</span></div>`).join("");

/* 初期化 */
placeTrain(); renderChips(); renderRoll();
setTimeout(()=>focusPlayer(false),300);
</script>
</body>
</html>
